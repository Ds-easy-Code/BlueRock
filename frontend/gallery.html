<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
__GALLERY_CSS__
</style>
</head>
<body>
<div class="wrap">

  <div class="rail">
    <div class="rail-brand">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span>Media Viewer</span>
    </div>

    <span class="badge">sandboxed</span>

    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Filter by filename...">
    </div>

    <div class="rail-section-label">Show</div>
    <div class="filter-group" id="filterGroup">
      <button class="filter-btn active" data-filter="all">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        All <span class="filter-count" id="countAll">__COUNT__</span>
      </button>
      <button class="filter-btn" data-filter="image">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>
        Images <span class="filter-count" id="countImage">0</span>
      </button>
      <button class="filter-btn" data-filter="video">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m23 7-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        Videos <span class="filter-count" id="countVideo">0</span>
      </button>
    </div>

    <div class="rail-spacer"></div>
    <div class="rail-footer" id="visibleCount">__COUNT__ files</div>
  </div>

  <div class="content">
    <div class="grid-area">
      <div class="grid" id="grid"></div>
      <div class="empty-state" id="emptyState" style="display:none">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <span>No files match that filter</span>
      </div>
    </div>
  </div>

</div>

<div class="lightbox" id="lightbox">
  <div class="lb-close" id="lbClose">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
  </div>
  <div class="lb-btn prev" id="lbPrev">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
  </div>
  <div class="lb-btn next" id="lbNext">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
  </div>
  <div class="lightbox-inner">
    <div class="lightbox-media-wrap" id="lbMediaWrap"></div>
    <div class="lightbox-caption">
      <div class="name" id="lbName"></div>
      <div class="sub" id="lbSub"></div>
    </div>
  </div>
</div>

<script>
const ITEMS = __ITEMS_JSON__;
__GALLERY_JS__
</script>
</body>
</html>
